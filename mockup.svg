<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 820" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf7f1"/><stop offset="1" stop-color="#f3ece1"/>
    </linearGradient>
    <linearGradient id="heat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0a07e"/><stop offset="1" stop-color="#d9603b"/>
    </linearGradient>
    <linearGradient id="heat2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4b89c"/><stop offset="1" stop-color="#e07c54"/>
    </linearGradient>
    <radialGradient id="warm" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#ffd9c4" stop-opacity="0.9"/><stop offset="1" stop-color="#ffd9c4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <circle cx="2" cy="2" r="1.3" fill="#ffffff" opacity="0.5"/>
    </pattern>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1d1a16" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1240" height="820" fill="url(#bg)"/>

  <!-- title block -->
  <text x="60" y="74" font-size="34" font-weight="800" fill="#1d1a16" letter-spacing="-1">발열 프리쉐이브 패치 · 시제품 컨셉</text>
  <text x="60" y="108" font-size="18" font-weight="600" fill="#6b6359">붙이면 따뜻해져 수염을 불려주는 1회용 패치 — 얼굴형 따라 잘라서 맞춤 사용</text>
  <rect x="60" y="128" width="64" height="5" rx="2.5" fill="#d9603b"/>

  <!-- ===== LEFT: flat product with cut grid ===== -->
  <g transform="translate(70,170)">
    <rect x="-10" y="-10" width="560" height="600" rx="22" fill="#fffdfa" stroke="#e6dfd4" filter="url(#sh)"/>
    <text x="20" y="28" font-size="17" font-weight="800" fill="#1d1a16">① 펼친 모양 · 절취선(잘라 쓰는 형태)</text>

    <!-- face guide silhouette (faint) -->
    <g transform="translate(270,300)">
      <path d="M -150 -210 C -150 -120 -120 -40 -60 30 C -30 70 30 70 60 30 C 120 -40 150 -120 150 -210"
            fill="none" stroke="#e6dfd4" stroke-width="2" stroke-dasharray="2 8"/>
    </g>

    <!-- patch shape: philtrum strip + chin pad + jaw wings + neck band -->
    <g transform="translate(270,300)">
      <!-- warm glow -->
      <ellipse cx="0" cy="0" rx="210" ry="230" fill="url(#warm)"/>

      <!-- left cheek/jaw wing -->
      <path d="M -176 -150 C -150 -60 -120 0 -78 44 L -120 96 C -176 60 -206 -30 -200 -120 Z" fill="url(#heat2)"/>
      <!-- right cheek/jaw wing -->
      <path d="M 176 -150 C 150 -60 120 0 78 44 L 120 96 C 176 60 206 -30 200 -120 Z" fill="url(#heat2)"/>

      <!-- philtrum strip (인중) -->
      <rect x="-46" y="-200" width="92" height="92" rx="16" fill="url(#heat)"/>
      <!-- chin + jaw U band -->
      <path d="M -120 -86 C -120 30 -70 110 0 132 C 70 110 120 30 120 -86 C 120 -120 86 -140 40 -140 L -40 -140 C -86 -140 -120 -120 -120 -86 Z" fill="url(#heat)"/>

      <!-- dotted texture overlay -->
      <rect x="-46" y="-200" width="92" height="92" rx="16" fill="url(#dots)"/>
      <path d="M -120 -86 C -120 30 -70 110 0 132 C 70 110 120 30 120 -86 C 120 -120 86 -140 40 -140 L -40 -140 C -86 -140 -120 -120 -120 -86 Z" fill="url(#dots)"/>

      <!-- perforation / cut guide lines (절취선) -->
      <g stroke="#fff" stroke-width="2.4" stroke-dasharray="3 7" opacity="0.92" fill="none">
        <!-- vertical center -->
        <line x1="0" y1="-140" x2="0" y2="128"/>
        <!-- horizontal segments on chin band -->
        <line x1="-118" y1="-40" x2="118" y2="-40"/>
        <line x1="-104" y1="34" x2="104" y2="34"/>
        <!-- separate philtrum from chin -->
        <line x1="-60" y1="-104" x2="60" y2="-104"/>
        <!-- wing separators -->
        <line x1="-150" y1="-150" x2="-92" y2="20"/>
        <line x1="150" y1="-150" x2="92" y2="20"/>
      </g>

      <!-- ear loop hints -->
      <path d="M -200 -120 q -44 60 0 130" fill="none" stroke="#caa089" stroke-width="6" stroke-linecap="round"/>
      <path d="M 200 -120 q 44 60 0 130" fill="none" stroke="#caa089" stroke-width="6" stroke-linecap="round"/>
    </g>

    <!-- labels -->
    <g font-size="13.5" font-weight="700" fill="#1d1a16">
      <text x="238" y="78" text-anchor="middle">인중</text>
      <text x="270" y="470" text-anchor="middle" fill="#a8472a">턱 · 턱선 U밴드</text>
      <text x="70" y="150" fill="#8a6a00">볼/턱선 윙</text>
      <text x="392" y="150" text-anchor="end" fill="#8a6a00">볼/턱선 윙</text>
    </g>
    <!-- scissors + cut note -->
    <g transform="translate(36,548)">
      <text font-size="20">✂️</text>
      <text x="30" y="16" font-size="13.5" font-weight="700" fill="#6b6359">흰 점선 = 절취선. 얼굴형 따라 인중/턱/윙을 분리·재단</text>
    </g>
  </g>

  <!-- ===== RIGHT TOP: on-face application ===== -->
  <g transform="translate(680,170)">
    <rect x="-10" y="-10" width="490" height="296" rx="22" fill="#fffdfa" stroke="#e6dfd4" filter="url(#sh)"/>
    <text x="20" y="28" font-size="17" font-weight="800" fill="#1d1a16">② 부착 예시 · 인중+턱에 쫙</text>

    <!-- simple front lower-face -->
    <g transform="translate(235,165)">
      <!-- head -->
      <path d="M -120 -110 C -120 -10 -96 70 0 120 C 96 70 120 -10 120 -110" fill="#f3e4d6" stroke="#e3cdb8" stroke-width="2"/>
      <!-- eyes hint -->
      <circle cx="-46" cy="-86" r="5" fill="#b9a48f"/><circle cx="46" cy="-86" r="5" fill="#b9a48f"/>
      <!-- nose hint -->
      <path d="M 0 -70 l -8 36 q 8 8 16 0 Z" fill="#e7d3bf"/>

      <!-- applied patch (philtrum + chin) -->
      <rect x="-22" y="-30" width="44" height="26" rx="7" fill="url(#heat)"/>
      <path d="M -64 6 C -64 64 -34 100 0 110 C 34 100 64 64 64 6 C 64 -12 40 -18 0 -18 C -40 -18 -64 -12 -64 6 Z" fill="url(#heat)"/>
      <rect x="-22" y="-30" width="44" height="26" rx="7" fill="url(#dots)"/>
      <path d="M -64 6 C -64 64 -34 100 0 110 C 34 100 64 64 64 6 C 64 -12 40 -18 0 -18 C -40 -18 -64 -12 -64 6 Z" fill="url(#dots)"/>

      <!-- warmth waves -->
      <g stroke="#d9603b" stroke-width="2.4" fill="none" opacity="0.75" stroke-linecap="round">
        <path d="M -86 40 q 10 -14 0 -28 q -10 -14 0 -28"/>
        <path d="M 86 40 q -10 -14 0 -28 q 10 -14 0 -28"/>
        <path d="M 0 130 q -12 -12 0 -24 q 12 -12 0 -24"/>
      </g>
    </g>
    <text x="235" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#6b6359">40~43℃ 온기로 수염 연화 → 1~3분 후 떼고 면도</text>
  </g>

  <!-- ===== RIGHT BOTTOM: cross-section layers ===== -->
  <g transform="translate(680,486)">
    <rect x="-10" y="-10" width="490" height="284" rx="22" fill="#fffdfa" stroke="#e6dfd4" filter="url(#sh)"/>
    <text x="20" y="28" font-size="17" font-weight="800" fill="#1d1a16">③ 단면 구조 (피부 → 바깥)</text>

    <g transform="translate(30,52)" font-size="13" font-weight="600">
      <!-- layer rows -->
      <g>
        <rect x="0" y="0" width="300" height="30" rx="6" fill="#e2f0ed" stroke="#bcdcd5"/>
        <text x="12" y="20" fill="#1f5a51">이형지 (떼어내는 보호 필름)</text>
      </g>
      <g transform="translate(0,38)">
        <rect x="0" y="0" width="300" height="30" rx="6" fill="#f1ece3" stroke="#e6dfd4"/>
        <text x="12" y="20" fill="#6b6359">약점착층 (피부 자극 적은 점착제)</text>
      </g>
      <g transform="translate(0,76)">
        <rect x="0" y="0" width="300" height="30" rx="6" fill="#fbe9e1" stroke="#f1d3c6"/>
        <text x="12" y="20" fill="#a8472a">보습·진정 에센스 시트 (선택 — 화장품行)</text>
      </g>
      <g transform="translate(0,114)">
        <rect x="0" y="0" width="300" height="30" rx="6" fill="url(#heat)"/>
        <text x="12" y="20" fill="#fff">철분 발열체 (통기성 부직포 파우치)</text>
      </g>
      <g transform="translate(0,152)">
        <rect x="0" y="0" width="300" height="30" rx="6" fill="#efe6da" stroke="#e0d3c2"/>
        <text x="12" y="20" fill="#6b6359">산소조절 백킹 (발열속도·지속 제어)</text>
      </g>

      <!-- arrows skin/air -->
      <g transform="translate(316,0)" font-size="12.5" font-weight="700">
        <text x="0" y="20" fill="#1f5a51">▲ 피부쪽</text>
        <text x="0" y="172" fill="#a8472a">▼ 바깥(산소)</text>
        <line x1="-6" y1="30" x2="-6" y2="150" stroke="#caa089" stroke-width="2" stroke-dasharray="3 4"/>
      </g>
    </g>
  </g>

  <!-- footer note -->
  <text x="60" y="800" font-size="13" fill="#a59c8f">철분 산화 발열(핫팩·스팀 아이마스크 동일 원리) · 1회용 · 개별 산소차단 포장 · 컨셉 일러스트(실제 비율/구조 아님)</text>
</svg>
